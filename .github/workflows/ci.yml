name: Excel IR MVP CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip build twine coverage
      - run: pip install -e .
      - run: python ci_check.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: corpus-report
          path: |
            corpus_results/summary.json
            corpus_results/report.html
            ci_inspect.json
          if-no-files-found: warn
      - run: python -m unittest -v tests.test_excel_ir_mvp tests.test_patch_ops tests.test_native_tables tests.test_metadata
      - run: python -m coverage erase
      - run: python -m coverage run --parallel-mode --source=src/excel_ir_mvp -m unittest tests.test_excel_ir_mvp.ExcelIRMVPTests.test_package_import tests.test_excel_ir_mvp.ExcelIRMVPTests.test_module_cli_smoke tests.test_excel_ir_mvp.ExcelIRMVPTests.test_package_module_main_smoke tests.test_excel_ir_mvp.ExcelIRMVPTests.test_api_parse_diff_validate tests.test_excel_ir_mvp.ExcelIRMVPTests.test_excel_ir_plus_small_helpers tests.test_excel_ir_mvp.ExcelIRMVPTests.test_models_validation_errors tests.test_excel_ir_mvp.ExcelIRMVPTests.test_reports_and_review_render tests.test_excel_ir_mvp.ExcelIRMVPTests.test_validate_load_and_schema_errors tests.test_excel_ir_mvp.ExcelIRMVPTests.test_validate_ir_error_branches tests.test_excel_ir_mvp.ExcelIRMVPTests.test_cli_main_metadata_diff_inprocess tests.test_excel_ir_mvp.ExcelIRMVPTests.test_cli_main_corpus_list_report_inprocess tests.test_excel_ir_mvp.ExcelIRMVPTests.test_inprocess_auxiliary_entrypoints_for_coverage
      - run: python -m coverage run --parallel-mode --source=src/excel_ir_mvp -m unittest tests.test_excel_ir_mvp.ExcelIRMVPTests.test_corpus_runner_api tests.test_excel_ir_mvp.ExcelIRMVPTests.test_bench_budget_api tests.test_excel_ir_mvp.ExcelIRMVPTests.test_roundtrip_diff_zero tests.test_excel_ir_mvp.ExcelIRMVPTests.test_patch_log_has_impact tests.test_excel_ir_mvp.ExcelIRMVPTests.test_validate tests.test_excel_ir_mvp.ExcelIRMVPTests.test_package_corpus_runner_helpers tests.test_excel_ir_mvp.ExcelIRMVPTests.test_compare_ir_cli_and_metadata_strip tests.test_excel_ir_mvp.ExcelIRMVPTests.test_alpha10_anonymize_status_and_compare_modes
      - run: python -m coverage run --parallel-mode --source=src/excel_ir_mvp -m unittest tests.test_patch_ops
      - run: python -m coverage run --parallel-mode --source=src/excel_ir_mvp -m unittest tests.test_native_tables tests.test_metadata
      - run: python -m coverage combine
      - run: python -m coverage report --show-missing --fail-under=70
      - run: python -m build --sdist --wheel
      - run: python -m twine check dist/*
      - run: pip install --force-reinstall dist/*.whl
      - run: python ci_check.py --installed
